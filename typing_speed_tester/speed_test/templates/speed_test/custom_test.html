{% extends 'speed_test/base.html' %}

{% block title %}Custom Typing Test{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <!-- Input Form -->
            <div class="card mb-4">
                <div class="card-body">
                    <h5 class="card-title">Enter Custom Text</h5>
                    <div class="form-group">
                        <textarea id="custom-text-input" class="form-control mb-3" rows="3" 
                                placeholder="Enter your text here. Words will be randomly shuffled for the test."></textarea>
                        <button id="start-custom-test" class="btn btn-primary">Create Test</button>
                    </div>
                </div>
            </div>

            <!-- Typing Test Area -->
            <div id="test-area" class="card mb-4 d-none">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="card-title mb-0">Custom Typing Test</h5>
                        <div class="d-flex align-items-center">
                            <div id="live-wpm" class="me-3">WPM: 0</div>
                            <div id="timer">Time: 0s</div>
                        </div>
                    </div>
                    <div id="text-display" class="mb-3 p-3 border rounded" style="font-size: 1.2em; line-height: 1.5;">
                        <span id="cursor">|</span>
                    </div>
                    <div class="form-group">
                        <input type="text" id="input-text" class="form-control" placeholder="Start typing..." autocomplete="off" disabled>
                    </div>
                    <div id="result" class="mt-3 d-none">
                        <h5>Results:</h5>
                        <p>WPM: <span id="wpm">0</span></p>
                        <p>Accuracy: <span id="accuracy">0</span>%</p>
                        <p>Time: <span id="time-taken">0</span>s</p>
                    </div>
                    <div class="mt-3">
                        <button id="start-btn" class="btn btn-primary">Start Test</button>
                        <button id="new-test-btn" class="btn btn-secondary ms-2 d-none">New Test</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

{% block extra_js %}
<script>
    let originalText = '';
    let currentIndex = 0;
    let startTime = null;
    let endTime = null;
    let isTestActive = false;
    let timerInterval = null;

    function updateTimer() {
        if (!isTestActive) return;
        const currentTime = new Date();
        const elapsedTime = (currentTime - startTime) / 1000;
        $('#timer').text(`Time: ${Math.round(elapsedTime)}s`);
        
        // Calculate and update live WPM
        if (currentIndex > 0) {
            const minutes = elapsedTime / 60;
            const words = currentIndex / 5; // Standard: 5 characters = 1 word
            const wpm = Math.round(words / minutes);
            $('#live-wpm').text(`WPM: ${wpm}`);
        }
    }

    function displayText() {
        const textDisplay = $('#text-display');
        textDisplay.empty();
        
        [...originalText].forEach((char, index) => {
            const span = $('<span>').text(char);
            textDisplay.append(span);
        });
        
        const cursor = $('<span>').attr('id', 'cursor').text('|');
        textDisplay.append(cursor);
        updateCursor(0);
    }

    function updateCursor(index) {
        const spans = $('#text-display span:not(#cursor)');
        const cursor = $('#cursor');
        
        if (index < spans.length) {
            cursor.insertAfter(spans.eq(index));
        } else {
            cursor.insertAfter(spans.last());
        }
    }

    function calculateWPM(text, timeInSeconds) {
        const words = text.length / 5; // Standard: 5 characters = 1 word
        const minutes = timeInSeconds / 60;
        return Math.round(words / minutes);
    }

    function calculateAccuracy(original, typed) {
        return Math.round((typed / original.length) * 100);
    }

    function startTypingTest() {
        isTestActive = true;
        startTime = new Date();
        currentIndex = 0;
        $('#input-text').prop('disabled', false).val('').focus();
        timerInterval = setInterval(updateTimer, 1000);
        $('#start-btn').text('Restart Test');
        $('#new-test-btn').addClass('d-none');
        $('#result').addClass('d-none');
        displayText();
    }

    function finishTest() {
        isTestActive = false;
        endTime = new Date();
        clearInterval(timerInterval);
        
        const timeInSeconds = (endTime - startTime) / 1000;
        const wpm = calculateWPM(originalText, timeInSeconds);
        const accuracy = calculateAccuracy(originalText, currentIndex);
        
        $('#wpm').text(wpm);
        $('#accuracy').text(accuracy);
        $('#time-taken').text(timeInSeconds.toFixed(1));
        $('#result').removeClass('d-none');
        $('#input-text').prop('disabled', true);
        $('#start-btn').text('Retry Test');
        $('#new-test-btn').removeClass('d-none');
    }

    function handleInput() {
        if (!isTestActive) return;
        
        const currentChar = originalText[currentIndex];
        const typedChar = this.value;
        
        if (!currentChar) {
            finishTest();
            return;
        }
        
        if (typedChar === currentChar) {
            // Correct typing
            $(`#text-display span:eq(${currentIndex})`).addClass('correct');
            $('#cursor').removeClass('error');
            currentIndex++;
            updateCursor(currentIndex);
        } else {
            // Wrong typing
            $('#cursor').addClass('error');
        }
        
        this.value = '';
    }

    // Event Handlers
    $('#start-custom-test').click(function() {
        const text = $('#custom-text-input').val().trim();
        if (!text) {
            alert('Please enter some text first!');
            return;
        }

        $.ajax({
            url: '{% url "speed_test:get_custom_text" %}',
            type: 'POST',
            data: {
                text: text,
                csrfmiddlewaretoken: '{{ csrf_token }}'
            },
            success: function(response) {
                originalText = response.text;
                $('#test-area').removeClass('d-none');
                displayText();
                $('#start-btn').text('Start Test');
                $('#input-text').prop('disabled', true);
                $('#result').addClass('d-none');
                $('#live-wpm').text('WPM: 0');
                $('#timer').text('Time: 0s');
                $('html, body').animate({
                    scrollTop: $("#test-area").offset().top - 20
                }, 500);
            },
            error: function() {
                alert('Error creating test. Please try again.');
            }
        });
    });

    $('#start-btn').click(function() {
        startTypingTest();
    });

    $('#new-test-btn').click(function() {
        $('#test-area').addClass('d-none');
        $('#custom-text-input').val('').focus();
        $('html, body').animate({
            scrollTop: 0
        }, 500);
    });

    $('#input-text').on('input', handleInput);

    $(document).on('keydown', function(e) {
        if (!isTestActive) return;
        $('#input-text').focus();
    });
</script>
{% endblock %}
{% endblock %}
