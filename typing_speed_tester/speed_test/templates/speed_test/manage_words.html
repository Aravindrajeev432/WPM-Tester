<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Words - Typing Speed Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Manage Custom Words</h1>
            <a href="{% url 'speed_test:home' %}" class="btn btn-secondary">Back to Test</a>
        </div>

        <div class="card mb-4">
            <div class="card-body">
                <h5 class="card-title">Add New Words</h5>
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="words" class="form-label">Paste words or sentences (words will be automatically separated)</label>
                        <textarea class="form-control" id="words" name="words" rows="4" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Add Words</button>
                </form>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Current Words</h5>
                {% if words %}
                    <div class="row">
                        {% for word in words %}
                            <div class="col-md-3 mb-2">
                                <div class="d-flex justify-content-between align-items-center border rounded p-2">
                                    <span>{{ word.word }}</span>
                                    <form method="POST" action="{% url 'speed_test:delete_word' word.id %}" style="display: inline;">
                                        {% csrf_token %}
                                        <button type="submit" class="btn btn-danger btn-sm">×</button>
                                    </form>
                                </div>
                            </div>
                        {% endfor %}
                    </div>
                {% else %}
                    <p class="text-muted">No custom words added yet.</p>
                {% endif %}
            </div>
        </div>
    </div>
</body>
</html>
